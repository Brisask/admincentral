version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: admincentral_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - admincentral

  webserver:
    image: nginx:alpine
    container_name: admincentral_webserver
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - admincentral

  db:
    image: mysql:8.0
    container_name: admincentral_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: admincentral
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: password
      MYSQL_USER: laravel
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - admincentral

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: admincentral_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    networks:
      - admincentral

networks:
  admincentral:
    driver: bridge

volumes:
  dbdata: